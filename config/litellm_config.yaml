# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  OpenClaw — LiteLLM Proxy Configuration (100% Local Ollama)                ║
# ║  Transparently maps Cloud model requests to Local models                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"

litellm_settings:
  set_verbose: false
  json_logs: true
  request_timeout: 300
  num_retries: 3
  retry_after: 5
  count_tokens: true
  cache: true
  cache_params:
    type: s3
    s3_bucket_name: "placeholder-or-postgres"

model_list:

  # ── Local Models (Ollama) ──────────────────────────────────────────────────
  - model_name: "reasoning-model"
    litellm_params:
      model: "anthropic/claude-3-5-sonnet-20241022"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  - model_name: "coding-model"
    litellm_params:
      model: "ollama/qwen3-coder:14b"
      api_base: "http://ollama:11434"
      max_tokens: 8192
      temperature: 0.1
      
  - model_name: "fast-model"
    litellm_params:
      model: "ollama/qwen3:8b"
      api_base: "http://ollama:11434"
      max_tokens: 8192
      temperature: 0.1

  - model_name: "ultra-fast-model"
    litellm_params:
      model: "ollama/llama3.2:latest"
      api_base: "http://ollama:11434"
      max_tokens: 8192
      temperature: 0.1

  - model_name: "nomic-embed"
    litellm_params:
      model: "ollama/nomic-embed-text"
      api_base: "http://ollama:11434"

router_settings:
  routing_strategy: "latency-based-routing"
  
  model_group_alias:
    # Map high-tier reasoning requests to Claude 3.5 Sonnet
    "claude-opus":
      model: "reasoning-model"
      
    # Map coding/engineering and general requests to Qwen3-Coder 14B
    "claude-sonnet":
      model: "coding-model"
    "gpt-4o":
      model: "coding-model"
      
    # Map ultra-fast/evaluation requests to Llama 3.2
    "gpt-4o-mini":
      model: "ultra-fast-model"
      
    # Map embeddings
    "text-embedding-3-large":
      model: "nomic-embed"
