# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  OpenClaw — LiteLLM Proxy Configuration (100% Local Ollama)                ║
# ║  Transparently maps Cloud model requests to Local models                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  disable_prisma_schema_update: true

litellm_settings:
  set_verbose: false
  json_logs: true
  request_timeout: 300
  num_retries: 3
  retry_after: 5
  count_tokens: true
  cache: true

model_list:

  # ── Cloud Open Source (HuggingFace Free API) ───────────────────────────────
  - model_name: "planner-model"
    litellm_params:
      model: "gemini-1.5-pro"
      api_key: "os.environ/GOOGLE_API_KEY"
      max_tokens: 8192
      temperature: 0.2

  - model_name: "architect-reviewer-model"
    litellm_params:
      model: "huggingface/Qwen/Qwen2.5-Coder-32B-Instruct"
      api_key: "os.environ/HF_API_KEY"
      max_tokens: 8192
      temperature: 0.1
      
  - model_name: "developer-model"
    litellm_params:
      model: "huggingface/Qwen/Qwen2.5-Coder-32B-Instruct"
      api_key: "os.environ/HF_API_KEY"
      max_tokens: 8192
      temperature: 0.1

  - model_name: "deepseek-model"
    litellm_params:
      model: "deepseek/deepseek-coder"
      api_key: "os.environ/DEEPSEEK_API_KEY"
      max_tokens: 8192
      temperature: 0.1

  # ── Local Models (Ollama) ──────────────────────────────────────────────────
  - model_name: "nomic-embed"
    litellm_params:
      model: "ollama/nomic-embed-text"
      api_base: "http://host.docker.internal:11434"

router_settings:
  routing_strategy: "latency-based-routing"
  
  model_group_alias:
    # Planners use 7B
    "planner-tier":
      model: "planner-model"
      hidden: false
      
    # Architects, Reviewers, QA use 14B
    "architect-tier":
      model: "architect-reviewer-model"
      hidden: false
      
    # Developers use 32B
    "developer-tier":
      model: "developer-model"
      hidden: false
      
    # Map embeddings
    "text-embedding-3-large":
      model: "nomic-embed"
      hidden: false
